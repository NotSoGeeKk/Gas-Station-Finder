<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuel Route Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; }
    .meta { font-size: 0.8rem; color: #a0aec0; display: flex; gap: 20px; flex-wrap: wrap; }
    .meta span strong { color: #e2e8f0; }
    .badge {
      background: #2d3748;
      border-radius: 4px;
      padding: 2px 8px;
      white-space: nowrap;
    }

    #map { flex: 1; }

    .legend {
      background: white;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 0.78rem;
      line-height: 1.8;
      box-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  </style>
</head>
<body>

<header>
  <h1>Fuel Route Map</h1>
  <div class="meta">
    <span class="badge"><strong>{{ start_query }}</strong> → <strong>{{ finish_query }}</strong></span>
    <span class="badge">{{ distance_miles }} mi &nbsp;|&nbsp; {{ duration_hours }} hrs</span>
    <span class="badge">{{ number_of_fuel_stops }} stop{{ number_of_fuel_stops|pluralize }} &nbsp;|&nbsp; ${{ total_fuel_cost_usd }} total</span>
    <span class="badge">Range: {{ max_range_miles }} mi &nbsp;|&nbsp; {{ mpg }} mpg</span>
  </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const routeGeometry = {{ route_geometry_json|safe }};
  const fuelStops     = {{ fuel_stops_json|safe }};
  const startPoint    = {{ start_json|safe }};
  const finishPoint   = {{ finish_json|safe }};

  const map = L.map("map");

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18,
  }).addTo(map);

  // Route polyline
  const polyline = L.polyline(routeGeometry, {
    color: "#3b82f6",
    weight: 4,
    opacity: 0.85,
  }).addTo(map);

  map.fitBounds(polyline.getBounds(), { padding: [30, 30] });

  // Helper: circle marker with letter/number label
  function labelledMarker(latlng, color, label, popupHtml) {
    const icon = L.divIcon({
      className: "",
      html: `<div style="
        background:${color};color:#fff;border-radius:50%;width:28px;height:28px;
        display:flex;align-items:center;justify-content:center;
        font-size:12px;font-weight:700;border:2px solid #fff;
        box-shadow:0 1px 4px rgba(0,0,0,0.4);">${label}</div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -16],
    });
    return L.marker(latlng, { icon }).bindPopup(popupHtml);
  }

  // Start pin
  labelledMarker(
    [startPoint.latitude, startPoint.longitude],
    "#16a34a", "S",
    `<strong>Start</strong><br>${startPoint.query}`
  ).addTo(map);

  // Finish pin
  labelledMarker(
    [finishPoint.latitude, finishPoint.longitude],
    "#dc2626", "F",
    `<strong>Finish</strong><br>${finishPoint.query}`
  ).addTo(map);

  // Fuel stop pins
  fuelStops.forEach((stop, i) => {
    const popup = `
      <strong>${stop.name}</strong><br>
      ${stop.address}<br>
      ${stop.city}, ${stop.state}<br>
      <br>
      <strong>$${stop.price_per_gallon.toFixed(3)}</strong>/gal &nbsp;·&nbsp;
      ${stop.gallons_purchased} gal<br>
      Leg cost: <strong>$${stop.cost.toFixed(2)}</strong><br>
      Mile marker: ${stop.mile_marker}
    `;
    labelledMarker(
      [stop.latitude, stop.longitude],
      "#d97706", i + 1,
      popup
    ).addTo(map);
  });

  // Legend control
  const legend = L.control({ position: "bottomright" });
  legend.onAdd = () => {
    const div = L.DomUtil.create("div", "legend");
    div.innerHTML = `
      <div class="legend-item"><div class="dot" style="background:#16a34a"></div> Start</div>
      <div class="legend-item"><div class="dot" style="background:#dc2626"></div> Finish</div>
      <div class="legend-item"><div class="dot" style="background:#d97706"></div> Fuel Stop</div>
      <div class="legend-item"><div style="width:12px;height:3px;background:#3b82f6;border-radius:2px;"></div> Route</div>
    `;
    return div;
  };
  legend.addTo(map);
</script>
</body>
</html>
